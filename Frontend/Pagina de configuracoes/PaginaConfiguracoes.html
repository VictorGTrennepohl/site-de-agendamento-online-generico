<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações — AgendaFácil</title>
  <link rel="stylesheet" href="Configuracoes.css" />
  <link rel="shortcut icon" href="../Pagina Principal/Logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    if (!localStorage.getItem('usuario')) {
      window.location.href = '../Pagina de login/Pagina de Login.html';
    }
  </script>
</head>
<body>

  <header class="navbar">
    <div class="LogoTopo">
      <img src="../Pagina Principal/Logo.png" class="Logo" />
      <span class="logo-text">AgendaFácil</span>
    </div>
    <nav class="nav-links">
      <a href="../Pagina Principal/Pagina_Principal.html">Início</a>
      <a href="../Pagina de tutorial/Comofunciona.html">Como funciona</a>
      <a href="../Pagina de contato/contato.html">Contato</a>
      <a href="../Pagina avaliacao/Avaliacoes.html">Avaliações</a>
    </nav>
    <div class="nav-actions">
      <button class="btn-entrar" onclick="window.location.href='../Pagina de login/Pagina de Login.html'">Entrar</button>
      <button class="btn-cadastro" onclick="window.location.href='../Pagina de Cadastro/CadastroUsuarios.html'">Cadastro</button>
    </div>
  </header>

  <main class="page-wrapper">

    <div class="page-header">
      <div class="header-avatar" id="header-avatar">?</div>
      <div>
        <h1 id="header-nome">Carregando...</h1>
        <p id="header-tipo"></p>
      </div>
    </div>

    <!-- ABAS -->
    <div class="abas">
      <button class="aba-btn active" onclick="trocarAba(this, 'aba-perfil')">👤 Meu perfil</button>
      <button class="aba-btn" onclick="trocarAba(this, 'aba-senha')">🔒 Alterar senha</button>
      <button class="aba-btn" onclick="trocarAba(this, 'aba-conta')">⚙️ Conta</button>
    </div>

    <!-- ABA: PERFIL -->
    <div class="aba-conteudo active" id="aba-perfil">
      <div class="card-section">
        <h2 class="card-titulo">Informações pessoais</h2>
        <form onsubmit="salvarPerfil(event)">

          <div class="form-row">
            <div class="form-group">
              <label>Nome completo</label>
              <input type="text" id="perfil-nome" placeholder="Seu nome" />
            </div>
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="perfil-email" placeholder="seu@email.com" readonly />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>CPF</label>
              <input type="text" id="perfil-cpf" placeholder="000.000.000-00" readonly />
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="text" id="perfil-telefone" placeholder="(00) 00000-0000" maxlength="15" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Cidade</label>
              <input type="text" id="perfil-cidade" placeholder="Sua cidade" />
            </div>
            <div class="form-group">
              <label>Estado</label>
              <select id="perfil-estado">
                <option value="">Selecione...</option>
                <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                <option>SP</option><option>SE</option><option>TO</option>
              </select>
            </div>
          </div>

          <div id="alerta-perfil"></div>
          <button type="submit" class="btn-salvar">Salvar alterações</button>

        </form>
      </div>
    </div>

    <!-- ABA: SENHA -->
    <div class="aba-conteudo" id="aba-senha">
      <div class="card-section">
        <h2 class="card-titulo">Alterar senha</h2>
        <form onsubmit="alterarSenha(event)">

          <div class="form-group">
            <label>Senha atual</label>
            <div class="input-senha">
              <input type="password" id="senha-atual" placeholder="Sua senha atual" />
              <span class="toggle-senha" onclick="toggleSenha('senha-atual')">👁</span>
            </div>
          </div>

          <div class="form-group">
            <label>Nova senha</label>
            <div class="input-senha">
              <input type="password" id="senha-nova" placeholder="Mínimo 8 caracteres" />
              <span class="toggle-senha" onclick="toggleSenha('senha-nova')">👁</span>
            </div>
          </div>

          <div class="form-group">
            <label>Confirmar nova senha</label>
            <div class="input-senha">
              <input type="password" id="senha-confirmar" placeholder="Repita a nova senha" />
              <span class="toggle-senha" onclick="toggleSenha('senha-confirmar')">👁</span>
            </div>
          </div>

          <div id="alerta-senha"></div>
          <button type="submit" class="btn-salvar">Alterar senha</button>

        </form>
      </div>
    </div>

    <!-- ABA: CONTA -->
    <div class="aba-conteudo" id="aba-conta">
      <div class="card-section">
        <h2 class="card-titulo">Gerenciar conta</h2>

        <div class="conta-item">
          <div>
            <h4>Sair da conta</h4>
            <p>Encerra sua sessão neste dispositivo.</p>
          </div>
          <button class="btn-sair" onclick="sairConta()">🚪 Sair</button>
        </div>

        <div class="conta-divider"></div>

        <div class="conta-item danger">
          <div>
            <h4>Excluir conta</h4>
            <p>Remove permanentemente sua conta e todos os dados. Esta ação não pode ser desfeita.</p>
          </div>
          <button class="btn-excluir" onclick="excluirConta()">🗑️ Excluir conta</button>
        </div>

      </div>
    </div>

  </main>

  <script src="Configuracoes.js"></script>
  <script src="../../auth.js"></script>

</body>
</html>
