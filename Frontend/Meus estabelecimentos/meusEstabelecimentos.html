<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Estabelecimentos — AgendaFácil</title>
  <link rel="stylesheet" href="MeusEstabelecimentos.css" />
  <link rel="shortcut icon" href="../Pagina Principal/Logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    const usuario = JSON.parse(localStorage.getItem('usuario'));
    if (!usuario) {
      window.location.href = '../Pagina de login/Pagina de Login.html';
    } else if (usuario.tipo !== 'profissional') {
      window.location.href = '../Pagina Principal/Pagina_Principal.html';
    }
  </script>
</head>
<body>

  <header class="navbar">
    <div class="LogoTopo">
      <img src="../Pagina Principal/Logo.png" class="Logo" />
      <span class="logo-text">AgendaFácil</span>
    </div>
    <nav class="nav-links">
      <a href="../Pagina Principal/Pagina_Principal.html">Início</a>
      <a href="../Pagina de tutorial/Comofunciona.html">Como funciona</a>
      <a href="../Pagina de contato/contato.html">Contato</a>
    </nav>
    <div class="nav-actions">
      <button class="btn-entrar" onclick="window.location.href='../Pagina de login/Pagina de Login.html'">Entrar</button>
      <button class="btn-cadastro" onclick="window.location.href='../Pagina de Cadastro/CadastroUsuarios.html'">Cadastro</button>
    </div>
  </header>

  <main class="page-wrapper">

    <div class="page-header">
      <div>
        <h1>Meus Estabelecimentos</h1>
        <p>Gerencie os estabelecimentos vinculados à sua conta</p>
      </div>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Carregando estabelecimentos...</p>
    </div>

    <!-- LISTA -->
    <div class="estab-lista" id="lista"></div>

    <!-- VAZIO -->
    <div class="vazio" id="vazio" style="display:none;">
      <div class="vazio-icon">🏢</div>
      <h3>Nenhum estabelecimento encontrado</h3>
      <p>Você ainda não possui estabelecimentos cadastrados.</p>
    </div>

  </main>

  <script src="MeusEstabelecimentos.js"></script>
  <script src="../../auth.js"></script>

</body>
</html>
