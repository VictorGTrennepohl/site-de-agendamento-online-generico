<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agende Fácil</title>
  <link rel="stylesheet" href="PaginaPrincipal.css" />
  <link href="Logo.png" rel="stylesheet" />
  <link rel="shortcut icon" href="Logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
 
  <header class="navbar">
    <div class="LogoTopo">
        <img src="Logo.png" class="Logo" />
      <span class="logo-text">AgendaFácil</span>
    </div>
    <nav class="nav-links">
      <a href="../Pagina Principal/Pagina_Principal.html" class="active">Início</a>
      <a href="../Pagina de tutorial/Comofunciona.html">Como funciona</a>
      <a href="../Pagina de contato/contato.html">Contato</a>
    </nav>
    <div class="nav-actions">
      <button class="btn-entrar" onclick="window.location.href='../Pagina de login/Pagina de Login.html'">Entrar</button>
      <button class="btn-cadastro" onclick="window.location.href='../Pagina de Cadastro/CadastroUsuarios.html'">Cadastro</button>
    </div>
  </header>
 
  <section class="servicos">
    <div class="servicos-content">
      <h1>Agende seu horário<br />em segundos!</h1>
      <p>Médicos, salões, mecânicos, professores e muito mais. Sem fila, sem espera.</p>
 
      <div class="agendar-button">
        <button class="btn-buscar" onclick="window.location.href='../Pagina Agendamento/Pagina Agendamento.html'">Agendar agora!</button>
      </div>
    </div>
  </section>
 
  <section class="main-content">
 
    <div class="left-column">
      <div class="card-section">
        <h2 class="section-title">Serviços mais agendados <span class="badge">✔</span></h2>
        <div class="services-grid">
          <div class="service-card">
            <div class="service-icon">🩺</div>
            <span>Médico</span>
          </div>
          <div class="service-card">
            <div class="service-icon">✂️</div>
            <span>Cabeleireiro</span>
          </div>
          <div class="service-card">
            <div class="service-icon">🚗</div>
            <span>Mecânico</span>
          </div>
          <div class="service-card">
            <div class="service-icon">🦷</div>
            <span>Dentista</span>
          </div>
        </div>
      </div>
    </div>
 
  </section>
  <script src="PaginaPrincipal.js"></script>
  <script src="../../auth.js"></script>

</body>
</html>
